<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>JAVICO — Quote Card v2 · 1080×1080</title>
<link rel="stylesheet" href="_lib.css">
<style>
  body { background: #1a1a1a; }
  .stage { width: 1080px; height: 1080px; background: var(--ink); position: relative; overflow: hidden; margin: 0 auto; transform-origin: top left; }
  @media (max-width: 1080px) { body { display: block; } .stage { transform: scale(calc(100vw / 1080)); } }

  .c-coral { position: absolute; width: 540px; height: 540px; top: -180px; right: -120px; background: var(--coral); border-radius: 50%; opacity: .95; z-index: 1; }
  .c-mint  { position: absolute; width: 260px; height: 260px; bottom: -80px; left: -60px; background: var(--mint); border-radius: 50%; opacity: .9; z-index: 1; }
  .c-y     { position: absolute; width: 80px; height: 80px; top: 420px; right: 220px; background: var(--yellow); border-radius: 50%; z-index: 1; }

  .halftone-tm { position: absolute; top: 50px; left: 380px; width: 200px; height: 110px; color: var(--yellow); opacity: .35; background-image: radial-gradient(circle at center, currentColor 1.4px, transparent 1.7px); background-size: 14px 14px; -webkit-mask-image: radial-gradient(ellipse at center, #000 35%, transparent 75%); mask-image: radial-gradient(ellipse at center, #000 35%, transparent 75%); z-index: 1; }
  .halftone-br { position: absolute; bottom: 140px; right: 220px; width: 200px; height: 90px; color: var(--yellow); opacity: .3; background-image: radial-gradient(circle at center, currentColor 1.4px, transparent 1.7px); background-size: 14px 14px; -webkit-mask-image: radial-gradient(ellipse at center, #000 40%, transparent 80%); mask-image: radial-gradient(ellipse at center, #000 40%, transparent 80%); z-index: 1; }

  .frame { position: absolute; inset: 60px; z-index: 5; display: flex; flex-direction: column; }
  .top { display: flex; justify-content: space-between; align-items: center; }
  .badge { background: #fff; color: var(--ink); padding: 10px 22px; font-weight: 700; letter-spacing: 3px; font-size: 13px; text-transform: uppercase; border-radius: 4px; }
  .badge::before { content: '✱'; color: var(--coral); margin-right: 8px; }
  .scribble-tag { font-family: var(--fhand); font-weight: 700; color: var(--yellow); font-size: 32px; transform: rotate(-4deg); position: relative; padding: 2px 14px; }
  .scribble-tag::before { content: ''; position: absolute; inset: -4px -10px; border: 3px solid var(--yellow); border-radius: 50%; transform: rotate(-3deg); pointer-events: none; }

  .mark {
    font-family: var(--fcond); font-style: italic; font-weight: 900;
    color: var(--yellow); font-size: 280px; line-height: 1;
    margin: 30px 0 -60px -10px; letter-spacing: -8px;
  }

  .quote {
    font-family: var(--fcond);
    font-style: italic; font-weight: 800;
    font-size: 84px; line-height: 1; letter-spacing: -2px;
    color: #fff; max-width: 920px;
    text-transform: uppercase;
  }
  .quote em { color: var(--yellow); font-style: italic; position: relative; display: inline-block; }
  .quote em .hand-wave { display: block; width: 100%; height: 14px; margin: -4px 0 0; }

  .author { margin-top: auto; padding-top: 28px; border-top: 2px solid rgba(255,255,255,.2); display: flex; align-items: center; gap: 18px; }
  .avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--coral); color: #fff; display: grid; place-items: center; font-family: var(--fcond); font-weight: 900; font-style: italic; font-size: 44px; }
  .author .info { color: #fff; font-family: var(--fs); }
  .author .info strong { display: block; font-weight: 800; font-size: 22px; letter-spacing: .5px; }
  .author .info span { font-size: 15px; color: rgba(255,255,255,.7); letter-spacing: .3px; }

  .logo-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo .mark-l { width: 42px; height: 42px; background: var(--ink); border: 2px solid #fff; border-radius: 10px; padding: 4px; }
  .logo .mark-l img { width: 100%; height: 100%; object-fit: contain; }
  .logo .wm { font-family: var(--fs); font-weight: 900; font-size: 16px; letter-spacing: .5px; line-height: 1; color: #fff; }
  .logo .wm small { display: block; font-weight: 600; font-size: 10px; color: rgba(255,255,255,.6); letter-spacing: 1.5px; margin-top: 4px; }
  .url { font-family: var(--fs); font-size: 14px; color: rgba(255,255,255,.7); }
  .url strong { color: #fff; font-weight: 800; }

  .star { position: absolute; color: var(--yellow); font-family: var(--fhand); font-weight: 700; z-index: 4; }
</style>
</head>
<body>
<div class="stage">
  <div class="c-coral"></div>
  <div class="c-mint"></div>
  <div class="c-y"></div>
  <div class="halftone-tm"></div>
  <div class="halftone-br"></div>

  <span class="star" style="top: 260px; left: 60px; font-size: 26px; transform: rotate(15deg);">✦</span>
  <span class="star" style="bottom: 240px; right: 280px; font-size: 24px; color: var(--coral); transform: rotate(-20deg);">✦</span>

  <div class="frame">
    <div class="top">
      <span class="badge">CÂU CHUYỆN THẬT</span>
      <span class="scribble-tag">JAVICO 2026</span>
    </div>
    <div class="mark">"</div>
    <p class="quote">Mình xin được học bổng MOE
      <em>100% học phí
        <svg class="hand-wave" viewBox="0 0 420 14" preserveAspectRatio="none">
          <path d="M 0 7 C 17 0 33 14 50 7 S 84 0 100 7 S 134 14 150 7 S 184 0 200 7 S 234 14 250 7 S 284 0 300 7 S 334 14 350 7 S 384 0 400 7 S 420 7 420 7"
                stroke="#FFD93D" stroke-width="5" stroke-linecap="round" fill="none"/>
        </svg>
      </em>
      + 15.000 TWD/tháng. Cả nhà không ngờ.
    </p>

    <div class="author">
      <div class="avatar">H</div>
      <div class="info">
        <strong>Phạm Thu Hương</strong>
        <span>Học bổng MOE · ĐH Văn Hóa Trung Hoa · 2025</span>
      </div>
    </div>

    <div class="logo-row">
      <div class="logo">
        <div class="mark-l"><img src="../img/Logo%20JVC%20unlock%20BG.png" alt="JAVICO"></div>
        <div class="wm">JAVICO<small>DU HỌC ĐÀI LOAN</small></div>
      </div>
      <span class="url"><strong>javico.vn</strong> · 0983 058 358</span>
    </div>
  </div>
</div>
</body>
</html>
